        <div>
          <div class="text-[9px] font-heading font-bold tracking-[3px] text-acl-t3 uppercase px-3 mb-1.5">Tổng quan</div>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto p-8">
      <div class="max-w-2xl">
        <a href="s-29-events-list.html" class="inline-flex items-center gap-1.5 text-sm text-acl-t2 hover:text-white mb-6"><i data-lucide="arrow-left" width="14" height="14"></i> Quay lại Events</a>

        <h1 class="font-heading font-black text-2xl text-white mb-8">Tạo Event Mới</h1>

        <form class="space-y-6">
          <div>
            <label class="block text-sm font-semibold text-white/70 mb-2">Tên event <span class="text-red-400">*</span></label>
            <input type="text" required value="ACL Monthly Meetup #28" placeholder="VD: Buổi học ACL tháng 5/2026" class="w-full px-4 py-3 bg-acl-card border border-acl rounded-xl text-white placeholder-acl-t3 focus:outline-none focus:border-orange-500" />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-white/70 mb-2"><i data-lucide="calendar" width="13" height="13" class="inline mr-1"></i> Ngày <span class="text-red-400">*</span></label>
              <input type="date" required value="2026-05-15" class="w-full px-4 py-3 bg-acl-card border border-acl rounded-xl text-white focus:outline-none focus:border-orange-500" style="color-scheme:dark" />
            </div>
            <div>
              <label class="block text-sm font-semibold text-white/70 mb-2"><i data-lucide="clock" width="13" height="13" class="inline mr-1"></i> Giờ bắt đầu <span class="text-red-400">*</span></label>
              <input type="time" required value="18:30" class="w-full px-4 py-3 bg-acl-card border border-acl rounded-xl text-white focus:outline-none focus:border-orange-500" style="color-scheme:dark" />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-white/70 mb-2"><i data-lucide="clock" width="13" height="13" class="inline mr-1"></i> Giờ kết thúc <span class="ml-1 text-acl-t3 font-normal">(tùy chọn)</span></label>
              <input type="time" value="21:00" class="w-full px-4 py-3 bg-acl-card border border-acl rounded-xl text-white focus:outline-none focus:border-orange-500" style="color-scheme:dark" />
            </div>
            <div>
              <label class="block text-sm font-semibold text-white/70 mb-2"><i data-lucide="dollar-sign" width="13" height="13" class="inline mr-1"></i> Phí tham dự (VNĐ)</label>
              <input type="number" min="0" step="1000" value="0" placeholder="0 = Miễn phí" class="w-full px-4 py-3 bg-acl-card border border-acl rounded-xl text-white placeholder-acl-t3 focus:outline-none focus:border-orange-500" />
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-white/70 mb-2"><i data-lucide="map-pin" width="13" height="13" class="inline mr-1"></i> Địa điểm <span class="text-red-400">*</span></label>
            <input type="text" required value="Hội trường tầng 3, 123 Nguyễn Huệ, Q1, TP.HCM" class="w-full px-4 py-3 bg-acl-card border border-acl rounded-xl text-white placeholder-acl-t3 focus:outline-none focus:border-orange-500" />
          </div>

          <div>
            <label class="block text-sm font-semibold text-white/70 mb-2"><i data-lucide="file-text" width="13" height="13" class="inline mr-1"></i> Mô tả <span class="ml-1 text-acl-t3 font-normal">(tùy chọn)</span></label>
            <textarea rows="4" placeholder="Nội dung buổi học, speaker, lưu ý cho người tham dự..." class="w-full px-4 py-3 bg-acl-card border border-acl rounded-xl text-white placeholder-acl-t3 focus:outline-none focus:border-orange-500 resize-none">Buổi gặp mặt thường niên tháng 5 cộng đồng ACL.

Speaker: Anh Nguyễn Văn Đức — CEO Saigon Logistics
Topic: Áp dụng AI trong tối ưu chuỗi cung ứng SME

Agenda:
18:30 — Networking & welcome drink
19:00 — Keynote
20:30 — Q&A và breakout discussion</textarea>
          </div>

          <div class="bg-cyan/5 border border-cyan/15 rounded-xl px-4 py-3 text-sm text-acl-t2">
            Sau khi tạo, hệ thống sẽ tự động generate QR code cho event và tạo URL đăng ký công khai.
          </div>

          <div class="flex gap-3 pt-2">
            <a href="s-29-events-list.html" class="flex-1 py-3 text-center text-acl-t2 border border-acl rounded-xl font-semibold text-sm hover:bg-white/5">Hủy</a>
            <button type="submit" class="btn-primary flex-1 py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2">Tạo event</button>
          </div>
