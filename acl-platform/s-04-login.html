<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>S-04 · Đăng nhập · ACL Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="_assets/styles.css" />
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-acl-base">

<div id="demo-topbar"
     data-prev="s-03-pending.html"
     data-next="s-05-forgot-password.html"
     data-id="S-04"
     data-name="Đăng nhập"
     data-us="US-002"
     data-role="All"></div>

<div class="demo-stage">
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-content">
      <div class="min-h-full bg-acl-base flex flex-col items-center justify-center px-6 py-10 relative overflow-hidden">
        <div class="glow-orange-top"></div>
        <div class="glow-cyan-bottom"></div>

        <div class="w-full max-w-sm relative z-10">
          <!-- Logo -->
          <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4"
                 style="background: linear-gradient(135deg, #FF6B1A 0%, #c83800 100%); box-shadow: 0 0 40px rgba(255,107,26,0.4);">
              <span class="font-heading font-black text-2xl text-white">A</span>
            </div>
            <h1 class="font-heading font-black text-3xl text-white tracking-tight">
              <span class="text-orange">ACL</span> Platform
            </h1>
            <p class="text-acl-t2 text-sm mt-1">Gieo đủ – Gặt rõ – Đáng tiền</p>
          </div>

          <!-- Form -->
          <form class="space-y-4" onsubmit="event.preventDefault(); window.location.href='s-08-home.html';">
            <div>
              <label class="acl-label">Email</label>
              <input type="email" placeholder="email@congty.vn" value="tuan.nguyen@acmecorp.vn" class="acl-input" />
            </div>

            <div>
              <label class="acl-label">Mật khẩu</label>
              <div class="relative">
                <input type="password" placeholder="••••••••" value="MySecurePass123!" class="acl-input pr-12" />
                <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-acl-t2 hover:text-white">
                  <i data-lucide="eye" width="18" height="18"></i>
                </button>
              </div>
            </div>

            <div class="flex justify-end">
              <a href="s-05-forgot-password.html" class="text-xs text-cyan hover:underline">Quên mật khẩu?</a>
            </div>

            <button type="submit"
                    class="btn-primary w-full h-13 rounded-xl font-heading font-bold text-base text-white flex items-center justify-center gap-2">
              Đăng nhập
              <i data-lucide="arrow-right" width="18" height="18"></i>
            </button>
          </form>

          <!-- Divider -->
          <div class="flex items-center gap-3 my-5">
            <div class="flex-1 h-px bg-white/10"></div>
            <span class="text-xs text-acl-t3">hoặc</span>
            <div class="flex-1 h-px bg-white/10"></div>
          </div>

          <!-- Google OAuth -->
          <button class="w-full h-12 bg-acl-card border border-acl rounded-xl flex items-center justify-center gap-3 text-sm font-medium text-white hover:border-white/20 hover:bg-white/5 transition-all">
            <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden>
              <path d="M17.64 9.2a10.3 10.3 0 0 0-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92a8.78 8.78 0 0 0 2.68-6.62Z" fill="#4285F4"/>
              <path d="M9 18a8.6 8.6 0 0 0 5.96-2.18l-2.92-2.26a5.43 5.43 0 0 1-8.07-2.85H.96v2.34A9 9 0 0 0 9 18Z" fill="#34A853"/>
              <path d="M3.96 10.71a5.4 5.4 0 0 1 0-3.42V4.95H.96a9 9 0 0 0 0 8.1l3-2.34Z" fill="#FBBC05"/>
              <path d="M9 3.58a4.86 4.86 0 0 1 3.44 1.34l2.58-2.58A8.65 8.65 0 0 0 9 0 9 9 0 0 0 .96 4.95l3 2.34A5.36 5.36 0 0 1 9 3.58Z" fill="#EA4335"/>
            </svg>
            Đăng nhập với Google
          </button>

          <p class="text-center text-sm text-acl-t2 mt-6">
            Chưa có tài khoản?
            <a href="s-01-register.html" class="text-cyan font-semibold hover:underline">Đăng ký thành viên</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="_assets/nav.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
